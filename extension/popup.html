<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rabbit Holes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --paper: #17110c;
        --surface: #21170f;
        --ink: #1a1009;
        --cream: #f3e8d4;
        --cream-2: #cdbd9f;
        --muted: #9e8b70;
        --line: rgba(230, 211, 180, .15);
        --green: #87b881;
        --gold: #c7ae84;
        --rust: #b8795f;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        width: 350px;
        padding: 16px;
        color: var(--cream);
        font-family: "Newsreader", Georgia, serif;
        background: var(--paper);
      }
      button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface);
        color: var(--cream);
        cursor: pointer;
        font-family: inherit;
        font-weight: 700;
      }
      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 40px;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .brand {
        width: 100%; height: 44px; min-width: 0; padding: 0; display: flex; align-items: center;
        border: 0; background: transparent; text-align: left;
      }
      .title {
        min-width: 0; overflow: visible; white-space: nowrap;
        display: inline-flex; align-items: baseline; gap: 0;
        font-family: "Playfair Display", Georgia, serif; font-size: 25px; font-weight: 700; line-height: .95;
      }
      .bunny-o { flex: 0 0 auto; width: .64em; height: .94em; margin: 0 .035em; transform: translateY(.08em); color: currentColor; }
      .icon-button {
        width: 40px; height: 40px; min-height: 40px; padding: 0; display: grid; place-items: center;
        border-radius: 12px; background: var(--ink); color: var(--cream-2); font-size: 15px;
      }
      .dashboard-link { background: var(--cream); color: #1a1009; border-color: transparent; font-family: "Playfair Display", Georgia, serif; font-size: 20px; }
      .summary {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        margin-bottom: 12px; padding: 12px 13px; border: 1px solid var(--line); border-radius: 16px; background: var(--ink);
      }
      .metric { min-width: 0; text-align: center; }
      .metric strong { display: block; font-family: "Playfair Display", Georgia, serif; font-size: 23px; line-height: 1; font-variant-numeric: tabular-nums; }
      .metric span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
      .divider { width: 1px; height: 30px; background: var(--line); }
      .status {
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        margin-bottom: 10px; padding: 10px 12px; border-radius: 15px;
        border: 1px solid rgba(135,184,129,.24); background: rgba(95,138,92,.1); color: var(--cream-2);
      }
      .status-left { display: flex; align-items: center; gap: 9px; min-width: 0; font-size: 14px; font-weight: 700; }
      #capture-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .timer {
        font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 700; letter-spacing: .04em;
        color: var(--cream-2); opacity: .92;
      }
      .dot { width: 9px; height: 9px; border-radius: 999px; background: var(--green); box-shadow: 0 0 0 5px rgba(135,184,129,.12), 0 0 16px rgba(135,184,129,.48); }
      .dot.paused { background: var(--gold); box-shadow: 0 0 0 5px rgba(199,174,132,.12), 0 0 16px rgba(199,174,132,.4); }
      .dot.stopped { background: var(--rust); box-shadow: 0 0 0 5px rgba(184,121,95,.12), 0 0 16px rgba(184,121,95,.38); }
      .controls { display: flex; gap: 6px; }
      .controls button {
        min-width: 58px; height: 30px; min-height: 30px; padding: 0 10px; display: grid; place-items: center;
        border-radius: 10px; background: var(--ink); color: var(--muted); font-family: "Newsreader", Georgia, serif; font-size: 12px;
      }
      .controls button:disabled { cursor: not-allowed; opacity: .45; filter: none; }
      .controls button.primary { color: #1a1009; border-color: transparent; background: var(--cream); }
      .controls button.danger { color: #d7a08b; border-color: rgba(184,121,95,.32); background: rgba(184,121,95,.1); }
      .controls button.danger:hover { background: rgba(184,121,95,.18); }
      .rabbit-action {
        position: relative; width: 100%; min-height: 48px; overflow: hidden;
        background: #21170f; color: var(--cream); font-size: 15px;
      }
      .rabbit-action.needs-key {
        border-color: rgba(184,121,95,.42);
        color: #efc1ad;
        background: rgba(184,121,95,.09);
      }
      .auth-panel,
      .app-panel {
        opacity: 1;
        transition: opacity .16s ease, transform .16s ease;
      }
      .auth-panel {
        display: none;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--ink);
        text-align: center;
      }
      .auth-panel p { margin-bottom: 12px; color: var(--cream-2); font-size: 14px; line-height: 1.35; }
      .app-panel.signed-out { display: none; }
      .auth-panel.signed-out { display: block; }
      .rabbit-action::before { content: none; }
      .provider-warning {
        display: none;
        margin-bottom: 10px;
        padding: 10px 12px;
        border: 1px solid rgba(184,121,95,.34);
        border-radius: 14px;
        background: rgba(184,121,95,.09);
        color: #efc1ad;
        font-size: 12.5px;
        font-weight: 700;
        line-height: 1.25;
      }
      .provider-warning.visible { display: block; }
      .account {
        display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 9px 11px;
        border: 1px solid var(--line); border-radius: 13px; background: var(--ink); min-width: 0;
      }
      .captured {
        margin: 10px 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(26,16,9,.72);
      }
      .captured summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        cursor: pointer;
        color: var(--cream-2);
        font-size: 13px;
        font-weight: 700;
        list-style: none;
      }
      .captured summary::-webkit-details-marker { display: none; }
      .captured summary::after {
        content: "⌄";
        color: var(--muted);
        font-size: 13px;
        transition: transform .16s ease;
      }
      .captured[open] summary::after { transform: rotate(180deg); }
      .captured-count {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .captured-list {
        max-height: 150px;
        overflow-y: auto;
        border-top: 1px solid var(--line);
      }
      .captured-empty,
      .captured-item {
        padding: 9px 12px;
        border-top: 1px solid rgba(230,211,180,.07);
      }
      .captured-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .captured-item:first-child { border-top: 0; }
      .captured-copy { min-width: 0; flex: 1; }
      .captured-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--cream);
        font-size: 12.5px;
        font-weight: 700;
      }
      .captured-meta,
      .captured-empty {
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 11.5px;
      }
      .captured-remove {
        width: 25px;
        height: 25px;
        min-width: 25px;
        border-radius: 8px;
        background: rgba(184,121,95,.08);
        border-color: rgba(184,121,95,.24);
        color: #d7a08b;
        font-size: 14px;
        line-height: 1;
      }
      .captured-remove:hover { background: rgba(184,121,95,.16); color: #efc1ad; }
      .account-dot { width: 7px; height: 7px; flex: 0 0 auto; border-radius: 999px; background: var(--green); box-shadow: 0 0 10px rgba(135,184,129,.5); }
      .account-email { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12.5px; color: var(--cream-2); }
      .account-signout {
        flex: 0 0 auto; padding: 5px 11px; border-radius: 9px; background: transparent;
        border: 1px solid var(--line); color: var(--rust); font-size: 12px; font-weight: 700;
      }
      button span { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
      button:hover { filter: brightness(1.05); }
    </style>
  </head>
  <body>
    <div class="header">
      <button class="brand" id="brand-open" title="Open dashboard">
        <span class="title">Rabbit H<svg viewBox="0 0 30 42" aria-hidden="true" class="bunny-o"><g fill="currentColor"><ellipse cx="11" cy="12.5" rx="3" ry="9.5" transform="rotate(-15 11 12.5)"></ellipse><ellipse cx="19" cy="12.5" rx="3" ry="9.5" transform="rotate(15 19 12.5)"></ellipse></g><circle cx="15" cy="29.5" r="9.5" fill="none" stroke="currentColor" stroke-width="3.8"></circle></svg>les</span>
      </button>
      <button class="icon-button dashboard-link" id="open" title="Open dashboard">↗</button>
    </div>

    <div class="auth-panel" id="auth-panel">
      <p id="auth-msg">Checking session...</p>
      <button class="rabbit-action" id="signin"><span>Open settings</span></button>
    </div>

    <div class="app-panel" id="app-panel">
      <div class="summary">
        <div class="metric"><strong id="visits">0</strong><span>pages</span></div>
        <div class="divider"></div>
        <div class="metric"><strong id="searches">0</strong><span>searches</span></div>
        <div class="divider"></div>
        <div class="metric"><strong id="tabs">0</strong><span>tabs</span></div>
      </div>

      <div class="status">
        <div class="status-left">
          <span class="dot" id="capture-dot"></span>
          <span id="capture-label">Capturing</span>
          <span class="timer" id="capture-timer">0:00</span>
        </div>
        <div class="controls" aria-label="Recording controls">
          <button id="record-toggle" title="Pause recording">Pause</button>
          <button id="record-stop" class="danger" title="End and clear session">End</button>
        </div>
      </div>

      <div class="provider-warning" id="provider-warning">Add an API key in Settings before building rabbit holes.</div>

      <button class="rabbit-action" id="cluster"><span>Build rabbit holes</span></button>

      <details class="captured" id="captured-details">
        <summary>
          <span>Captured tabs</span>
          <span class="captured-count" id="captured-count">0</span>
        </summary>
        <div class="captured-list" id="captured-list">
          <div class="captured-empty">No tabs captured yet.</div>
        </div>
      </details>

      <div class="account" id="account">
        <span class="account-dot"></span>
        <span class="account-email" id="account-email">Local-first mode</span>
        <button class="account-signout" id="signout">Settings</button>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
